name: Build production

# Deliberately manual-only: pushing to main does NOT publish to production by
# itself. Someone has to run this workflow on purpose (Actions tab -> Run
# workflow, or `gh workflow run build-prod.yml`), choosing which ref to
# publish. Re-running this against an older ref is also the rollback path.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and publish to production"
        default: main

concurrency:
  group: build-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Publish build to production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git commit --allow-empty -m "Deploy $(git rev-parse --short HEAD) to production"
          git push origin HEAD:production --force
