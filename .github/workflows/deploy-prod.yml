name: Deploy production

on:
  push:
    branches: [production]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
          script: |
            set -euo pipefail
            cd ~/xendelta-hub-prod
            git fetch origin production
            git reset --hard origin/production
            npm ci --omit=dev
            pm2 restart xendelta-hub --update-env || pm2 start ecosystem.config.cjs --only xendelta-hub
            pm2 save
            echo "Deployed $(git rev-parse HEAD) to production"
